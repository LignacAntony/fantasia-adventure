name: Api — PR Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api.pr.yml"

defaults:
  run:
    working-directory: ./api

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - run: npm run build

  static:
    name: Static Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run test:static:pretty
