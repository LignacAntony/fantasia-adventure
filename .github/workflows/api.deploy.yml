name: Api — Deploy

on:
  push:
    branches:
      - main
    paths:
      - "api/**"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm run test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest api tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep '^api/v' | head -n 1)
          echo "latest=${LATEST:-api/v0.0.0}" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          LATEST=${{ steps.get_tag.outputs.latest }}
          VERSION=${LATEST#api/v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_TAG="api/v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: "api ${{ steps.bump.outputs.new_tag }}"
          generate_release_notes: true
